<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique de jeux </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="style.css">
</head>
<body>

         <header class=" bg-yellow-300 text-white p-4  shadow-[0_10px_30px_rgba(59,130,246,0.5)]" >
    <div class="  w-full flex   items-center justify-between">
         <div class="mt-8">
         <h1>Good Morning</h1>
         <h1>Welcome Shop GAME</h1>
       </div>
        <p class="text-black font-bold hidden sm:block">Parcourez, choisissez et ajoutez vos articles préférés en quelques clics.</p>
    <div class="flex justify-end  ">
        <img src="images/game1.avif" alt="Notification icon" width="100" class="rounded-lg border border-black "  />
        
</div>
 </div>
<div class="mt-10 flex items-center justify-center w-full">
 <input
 id="recherchInput"
  type="text"
  placeholder="Rechercher..."
  class="border p-2 rounded-lg w-full bg-white text-black "
/>
</div>
        </header>

        <main>

   <h1 class="font-bold pt-4 pl-3 text-center tracking-widest font-[Poppins] ">Nos produits</h1>
   <div id="categories" class="flex gap-3 sm:gap-10 mb-4 justify-center ">
<h1>Catégories:</h1>
   <button class="category bg-amber-500 border border-black rouded-lg" data-cat="all">Tout</button>
 <button class="category bg-amber-500 border border-black rouded-lg" data-cat="Sport">Sport</button>
 <button class="category bg-amber-500 border border-black rouded-lg" data-cat="Action">Action</button>
<button class="category bg-amber-500 border border-black rouded-lg" data-cat="FPS">Adventure</button>
 <button class="category bg-amber-500 border border-black rouded-lg" data-cat="RPG">RPG</button>

</div>

   <div id="gameContainer" class=" grid grid-cols-2 sm:grid-cols-3"></div>



        </main>
<footer class="w-full">
  <div class="w-full flex justify-center">
    <a href="panier.html"
       class="font-bold text-xl bg-yellow-500 border border-black px-4 py-2 mt-2 rounded-lg">
       Voir ton panier
    </a>
  </div>
</footer>
 
    
  <script src="data.js"></script>
  <script src="main.js"></script> 
</body>
</html>
